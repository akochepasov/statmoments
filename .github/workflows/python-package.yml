name: Building Python Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: python-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
          cache: 'pip'

      - name: Install lint dependencies
        run: |
          # Build and test requirements
          pip install --no-cache-dir flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 --count --select=E9,F63,F7,F82 --show-source --statistics .
          # exit-zero treats all errors as warnings
          flake8 --count --exit-zero --max-line-length=120 --max-complexity=10 --statistics .

  build-sdist:
    name: Build and test sdist
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy cython build setuptools wheel

      - name: Build package
        run: python -m build --sdist

      - name: Install from sdist (compile Cython during install)
        run: pip install dist/*.tar.gz

      - name: Smoke test sdist install
        run: |
          workspace="${GITHUB_WORKSPACE}"
          test_dir="${RUNNER_TEMP}/statmoments-sdist-test"
          mkdir -p "$test_dir"
          cd "$test_dir"
          python -c "import statmoments; import statmoments.univar as uv; uv.Univar(4, 2, moment=2); print('sdist smoke ok')"

      - name: Upload sdist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-sdist
          path: dist/*.tar.gz
          retention-days: 1

  build-test-wheels:
    name: ${{ matrix.python-version }} on ${{ matrix.os }}
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macOS-14, windows-2022]
        python-version: ['3.8', '3.10', '3.12']
        exclude:
          - os: ubuntu-22.04
            python-version: '3.8'
          - os: ubuntu-22.04
            python-version: '3.10'

    steps:
      - run: echo "The job triggered by ${{ github.event_name }} on ${{ runner.os }}"
      - run: echo "The branch name ${{ github.ref }}"

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Build Windows wheel
        if: matrix.os == 'windows-2022'
        run: |
          python -m pip install --upgrade pip
          pip install numpy cython build setuptools wheel
          python -m build --wheel

      - name: Build manylinux wheels
        if: matrix.os == 'ubuntu-22.04'
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel
          python -m cibuildwheel --platform linux --output-dir dist

      - name: Install built wheel (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $wheel = (Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1).FullName
          pip install "${wheel}[test]"

      - name: Install built wheel (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          wheel=$(ls dist/*cp312*.whl | head -n 1)
          pip install "${wheel}[test]"

      - name: Run tests on installed wheel (Windows)
        if: matrix.os == 'windows-2022'
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          $covConfig = Join-Path $workspace 'pyproject.toml'
          $covXml = Join-Path $workspace 'coverage.xml'
          $testDir = Join-Path $env:RUNNER_TEMP 'statmoments-wheel-test'
          New-Item -ItemType Directory -Force -Path $testDir | Out-Null
          Set-Location $testDir
          python -m pytest --durations=0 -n auto --dist loadfile --cov=statmoments --cov-config "$covConfig" --cov-report "xml:$covXml" --pyargs statmoments.tests
          coverage report --rcfile "$covConfig" -m

      - name: Run tests on installed wheel (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          workspace="${GITHUB_WORKSPACE}"
          cov_config="${workspace}/pyproject.toml"
          cov_xml="${workspace}/coverage-linux.xml"
          test_dir="${RUNNER_TEMP}/statmoments-wheel-test"
          mkdir -p "$test_dir"
          cd "$test_dir"
          python -m pytest --durations=0 -n auto --dist loadfile --cov=statmoments --cov-config "$cov_config" --cov-report "xml:$cov_xml" --pyargs statmoments.tests
          coverage report --rcfile "$cov_config" -m

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os == 'windows-2022' && format('package-wheel-windows-py{0}', matrix.python-version) || 'package-wheel-linux-manylinux-x86_64' }}
          path: dist/*.whl
          retention-days: 1

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os == 'windows-2022' && 'unittests' || 'linux' }}
          fail_ci_if_error: true
          files: ${{ matrix.os == 'windows-2022' && './coverage.xml' || './coverage-linux.xml' }}

  collect-artifacts:
    name: Collect all artifacts
    needs: [build-test-wheels, build-sdist]
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: all-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -R all-artifacts/

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-artifacts
          path: |
            all-artifacts/*.whl
            all-artifacts/*.tar.gz
          retention-days: 7

      - name: Delete intermediate artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            package-wheel-*
            package-sdist
