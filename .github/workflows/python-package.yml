name: Building Python Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: python-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
          cache: 'pip'

      - name: Install lint dependencies
        run: |
          # Build and test requirements
          pip install --no-cache-dir flake8

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 --count --select=E9,F63,F7,F82 --show-source --statistics .
          # exit-zero treats all errors as warnings
          flake8 --count --exit-zero --max-line-length=120 --max-complexity=10 --statistics .

  build-sdist:
    name: Build and test sdist
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.8'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy 'Cython>=0.29' build setuptools wheel

      - name: Build package
        run: python -m build --sdist

      - name: Install from sdist (compile Cython during install)
        run: pip install dist/*.tar.gz

      - name: Smoke test sdist install
        run: |
          python - << 'PY'
          import os
          import tempfile

          # Avoid importing the checked-out source tree from the repo root.
          os.chdir(tempfile.gettempdir())

          import statmoments
          import statmoments.univar as uv

          print(statmoments.__file__)
          uv.Univar(4, 2, moment=2)
          print('sdist smoke ok')
          PY

      - name: Upload sdist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-sdist
          path: dist/*.tar.gz
          retention-days: 1

  build-windows-wheels:
    name: Windows ${{ matrix.python-version }}
    needs: lint
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.10', '3.12']

    steps:
      - run: echo "The job triggered by ${{ github.event_name }} on ${{ runner.os }}"
      - run: echo "The branch name ${{ github.ref }}"

      - name: Checkout project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Build Windows wheel
        run: |
          python -m pip install --upgrade pip
          pip install numpy 'Cython>=0.29' build setuptools wheel
          python -m build --wheel

      - name: Install built wheel
        shell: pwsh
        run: pip install (Get-ChildItem -Path dist -Filter *.whl | Select-Object -First 1).FullName

      - name: Install test dependencies
        run: |
          # Build and test requirements
          pip install flake8 pytest pytest-cov pytest-xdist coverage
          # Main requirements
          pip install -r requirements.txt

      - name: Run tests on installed wheel
        shell: pwsh
        run: |
          $testDir = Join-Path $env:RUNNER_TEMP 'statmoments-wheel-test'
          New-Item -ItemType Directory -Force -Path $testDir | Out-Null
          Set-Location $testDir
          python -m pytest --durations=0 -n auto --dist loadfile --cov=statmoments --cov-report "xml:$env:GITHUB_WORKSPACE\coverage.xml" --pyargs statmoments.tests
          coverage report -m

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-wheel-windows-py${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          fail_ci_if_error: true
          files: ./coverage.xml

  build-linux-manylinux-wheels:
    name: Build manylinux wheels (Linux x86_64)
    needs: lint
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Build manylinux wheels
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel
          python -m cibuildwheel --platform linux --output-dir dist

      - name: Upload linux wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-wheel-linux-manylinux-x86_64
          path: dist/*.whl
          retention-days: 7

  collect-artifacts:
    name: Collect all artifacts
    needs: [build-windows-wheels, build-sdist, build-linux-manylinux-wheels]
    runs-on: ubuntu-22.04
    permissions:
      actions: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: all-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -R all-artifacts/

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-artifacts
          path: |
            all-artifacts/*.whl
            all-artifacts/*.tar.gz
          retention-days: 7

      - name: Delete intermediate artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            package-wheel-*
            package-sdist
